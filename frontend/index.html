<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Red Sea Explorer - Member 6</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
      }
      #map {
        height: 100vh;
        flex-grow: 1;
      }

      /* Member 6 Sidebar Styling */
      #sidebar {
        width: 300px;
        background: #1a1a1a;
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        z-index: 2000;
      }
      h2 {
        color: #00f2ff;
        margin-top: 0;
      }
      .filter-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
      }
      select,
      input[type="range"],
      button {
        width: 100%;
        padding: 10px;
        border-radius: 4px;
        border: none;
      }
      button {
        background: #00f2ff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }
      button:hover {
        background: #00b8c4;
      }
      .stats-panel {
        margin-top: auto;
        background: #2a2a2a;
        padding: 15px;
        border-radius: 8px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h2>Control Panel</h2>

      <div class="filter-group">
        <label>Species Filter</label>
        <select id="speciesSelect">
          <option value="">All Species</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Search Radius: <span id="radiusLabel">100</span> km</label>
        <input type="range" id="radiusSlider" min="10" max="500" value="100" />
      </div>

      <button id="applyBtn">Apply Filters</button>

      <div class="stats-panel" id="statsPanel">
        <strong>Area Stats:</strong>
        <p id="totalCount">Sightings: 0</p>
        <p id="avgDepth">Avg Depth: --</p>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="script.js"></script>
  </body>
</html>
